
# Render Blueprint — infra as code.
# In Render: New > Blueprint, point at this repo, and it provisions the service.
# (Satisfies the "one-command setup" deliverable.)
services:
  - type: web
    name: viralwatch
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    # $PORT is injected by Render. The prebuilt data/viralwatch.db is committed,
    # so no database provisioning step is needed.
