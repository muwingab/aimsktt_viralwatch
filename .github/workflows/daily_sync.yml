name: Run Daily Pipeline

on:
  schedule:
    - cron: '0 8 * * *' # Run daily at 08:00 UTC
  workflow_dispatch:     # Allows manual triggering

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # ─── 1. CHECKOUT WITHOUT LFS (Skips missing server objects) ───
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: false # 👈 Changed to false so it doesn't crash on missing LFS objects
        env:
          GIT_LFS_SKIP_SMUDGE: 1 # 👈 Force Git to bypass LFS download attempts completely

      # ─── 2. Set up Python environment ───
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ─── 3. Install your project dependencies ───
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─── 4. Execute the pipeline ───
      - name: Run pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python daily_pipeline.py
